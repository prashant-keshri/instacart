<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FreshKart – My Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="common.css">
  <style>
    .page-header { margin: 20px 0; }
    .page-header h1 { font-size: 28px; }
    .page-header p { color: var(--text-muted); margin-top: 5px; }
    .orders-list { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
    .order-card { background: var(--surface); border-radius: 20px; border: 1px solid var(--border-light); overflow: hidden; }
    .order-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; padding: 18px 20px; background: var(--bg-primary); border-bottom: 1px solid var(--border-light); cursor: pointer; transition: all 0.2s; }
    .order-header:hover { background: rgba(249,115,22,0.05); }
    .order-header-left { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
    .order-id { font-weight: 700; }
    .order-date { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
    .order-status { padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; }
    .status-delivered { background: #e8f5e9; color: #2e7d32; }
    .status-shipped { background: #fff3e0; color: #f97316; }
    .status-processing { background: #e3f2fd; color: #1976d2; }
    .status-cancelled { background: #ffebee; color: #c62828; }
    .order-total { font-weight: 700; font-size: 18px; color: var(--green-primary); }
    .expand-icon { transition: transform 0.2s; }
    .order-header.expanded .expand-icon { transform: rotate(180deg); }
    .order-items { padding: 20px; display: none; background: var(--surface); }
    .order-items.expanded { display: block; animation: fadeIn 0.3s ease; }
    .order-items-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }
    .order-item-product { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-primary); border-radius: 16px; cursor: pointer; flex-wrap: wrap; gap: 12px; transition: all 0.2s; }
    .order-item-product:hover { transform: translateX(5px); background: rgba(249,115,22,0.05); }
    .order-item-left { display: flex; gap: 16px; align-items: center; flex: 1; }
    .order-item-img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
    .order-item-details { flex: 1; }
    .order-item-name { font-weight: 600; margin-bottom: 5px; }
    .order-item-qty { font-size: 12px; color: var(--text-muted); }
    .order-item-price { text-align: right; font-weight: 700; }
    .order-item-savings { font-size: 11px; color: var(--green-primary); margin-top: 3px; }
    .order-item-subtotal { font-size: 11px; color: var(--text-muted); }
    .price-breakdown-section { background: var(--bg-primary); border-radius: 16px; padding: 20px; margin-top: 20px; }
    .delivery-address { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-light); }
    .delivery-address h4 { font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; color: var(--orange-primary); }
    .order-action-buttons { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; flex-wrap: wrap; }
    .btn-edit-address { background: var(--blue-primary); color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
    .btn-cancel { background: var(--red-primary); color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
    .btn-reorder { background: var(--orange-primary); color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
    .btn-edit-address:hover, .btn-cancel:hover, .btn-reorder:hover { opacity: 0.9; transform: scale(0.98); }
    
    /* Order Timeline */
    .order-timeline {
      background: var(--bg-primary);
      border-radius: 16px;
      padding: 18px;
      margin-top: 20px;
      overflow-x: auto;
    }
    .timeline-steps {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      margin-bottom: 20px;
      min-width: 100%;
    }
    .timeline-steps::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--border-light);
      z-index: 0;
    }
    .timeline-step {
      text-align: center;
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .step-icon {
      width: 40px;
      height: 40px;
      background: var(--surface);
      border: 2px solid var(--border-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--text-muted);
      transition: all 0.3s ease;
      margin-bottom: 8px;
    }
    .step-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
    }
    .timeline-step.completed .step-icon {
      background: var(--green-primary);
      border-color: var(--green-primary);
      color: white;
      box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
    }
    .timeline-step.active .step-icon {
      border-color: var(--orange-primary);
      color: var(--orange-primary);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.2);
    }
    .timeline-step.completed .step-label { color: var(--green-primary); }
    .timeline-step.active .step-label { color: var(--orange-primary); }
    
    /* Update Items */
    .update-item { padding: 12px 0; border-bottom: 1px solid var(--border-light); display: flex; gap: 12px; }
    .update-item:last-child { border-bottom: none; }
    .update-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .update-content { flex: 1; }
    .update-title { font-weight: 600; font-size: 13px; }
    .update-date { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    
    /* Delivery Details Expandable */
    .delivery-details-expandable {
      margin-top: 20px;
      border: 1px solid var(--border-light);
      border-radius: 16px;
      overflow: hidden;
    }
    .delivery-details-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: var(--bg-primary);
      cursor: pointer;
      transition: background 0.2s;
    }
    .delivery-details-header:hover { background: var(--border-light); }
    .delivery-details-title { display: flex; align-items: center; gap: 10px; font-weight: 600; }
    .delivery-details-title i { color: var(--orange-primary); font-size: 18px; }
    .delivery-details-toggle { transition: transform 0.2s; }
    .delivery-details-expandable.open .delivery-details-toggle { transform: rotate(180deg); }
    .delivery-details-content { display: none; padding: 20px; background: var(--surface); }
    .delivery-details-expandable.open .delivery-details-content { display: block; animation: fadeIn 0.3s ease; }
    .delivery-details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .delivery-section { background: var(--bg-primary); border-radius: 16px; padding: 16px; }
    .delivery-section-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--orange-primary); display: flex; align-items: center; gap: 8px; }
    .delivery-section-title i { color: var(--orange-primary); }
    .info-row { display: flex; margin-bottom: 12px; padding: 6px 0; border-bottom: 1px dashed var(--border-light); }
    .info-label { width: 120px; font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .info-value { flex: 1; font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .info-value.paid { color: var(--green-primary); }
    .info-value.not-paid { color: var(--red-primary); }
    .payment-method { display: inline-flex; align-items: center; gap: 8px; background: var(--surface); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .delivery-agent-card { background: linear-gradient(135deg, rgba(249,115,22,0.1), rgba(46,125,50,0.1)); border-radius: 12px; padding: 12px; margin-top: 12px; }
    .agent-status { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; padding: 4px 10px; border-radius: 20px; background: var(--surface); margin-bottom: 10px; }
    .agent-status.confirmed { background: var(--green-primary); color: white; }
    .agent-status.pending { background: var(--orange-primary); color: white; }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
    
    /* Order Price Breakdown */
    .order-price-breakdown { margin: 20px 0; }
    .order-price-breakdown .price-breakdown-box { background: var(--bg-primary); border: 1px solid var(--border-light); border-radius: 16px; padding: 16px; }
    .order-price-breakdown .breakdown-header { font-weight: 700; font-size: 14px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--orange-primary); display: flex; align-items: center; gap: 8px; color: var(--text-primary); }
    .order-price-breakdown .breakdown-header i { color: var(--orange-primary); }
    .order-price-breakdown .breakdown-row { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 6px 0; font-size: 13px; }
    .order-price-breakdown .breakdown-row.total { font-weight: 800; border-top: 2px solid var(--border-light); margin-top: 8px; padding-top: 12px; font-size: 15px; color: var(--green-primary); }
    .order-price-breakdown .breakdown-row.discount-row { background: rgba(239,68,68,0.1); border-radius: 8px; padding: 8px 12px; margin: 4px 0; }
    .order-price-breakdown .discount-amount { color: var(--red-primary); font-weight: 600; }
    .order-price-breakdown .free-delivery { color: var(--green-primary); font-weight: 600; }
    
    /* Contact Links */
    .contact-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; padding-top: 10px; }
    .contact-link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--surface); border-radius: 25px; text-decoration: none; font-size: 12px; transition: all 0.2s; border: 1px solid var(--border-light); }
    .contact-link:hover { transform: translateY(-2px); }
    .contact-link.call { color: var(--green-primary); }
    .contact-link.email { color: var(--blue-primary); }
    .contact-link.whatsapp { color: #25D366; }
    
    /* Explore Categories */
    .explore-categories-section { margin: 40px 0 20px; }
    .category-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 20px 0; }
    .cat-link { padding: 2px 15px 15px 15px; width: 90px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-decoration: none; background: var(--surface); border-radius: 15px; transition: transform 0.2s; border: 1px solid var(--border-light); }
    .cat-link:hover { transform: translateY(-4px); border-color: var(--orange-primary); }
    .cat-link span { color: var(--text-primary); text-align: center; font-size: 12px; }
    .cat-icon { width: 60px; height: 60px; background: var(--bg-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; margin-bottom: 6px; }
    
    /* Products Grid */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 18px; margin-top: 20px; }
    .show-more-btn { display: block; margin: 30px auto; background: var(--blue-primary); color: white; border: none; padding: 10px 28px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .show-more-btn:hover { opacity: 0.9; transform: scale(0.98); }
    .empty-state { text-align: center; padding: 60px 20px; background: var(--surface); border-radius: 24px; border: 1px solid var(--border-light); }
    
    /* Address Modal */
    .address-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 2100; justify-content: center; align-items: center; }
    .address-modal-container { background: var(--surface); border-radius: 24px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; padding: 24px; }
    .address-modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .address-select-item { display: flex; align-items: center; gap: 15px; padding: 12px; border: 1px solid var(--border-light); border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
    .address-select-item:hover { border-color: var(--orange-primary); background: rgba(249,115,22,0.05); }
    .address-select-item.selected { border-color: var(--green-primary); background: rgba(46,125,50,0.05); }
    .address-select-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border-light); }
    .address-select-item.selected .address-select-radio { border-color: var(--green-primary); background: var(--green-primary); box-shadow: inset 0 0 0 3px var(--surface); }
    .address-form-fields { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-light); }
    .address-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .address-form-group { margin-bottom: 12px; }
    .address-form-group label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .address-form-group input, .address-form-group textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border-light); background: var(--bg-primary); color: var(--text-primary); font-size: 13px; }
    .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
    .btn-save-address { background: var(--green-primary); color: white; border: none; padding: 10px 24px; border-radius: 30px; cursor: pointer; font-weight: 600; }
    .btn-cancel-modal { background: var(--red-primary); color: white; border: none; padding: 10px 24px; border-radius: 30px; cursor: pointer; font-weight: 600; }
    
    /* Blinking Animation */
    @keyframes blinkHighlight {
      0% { background-color: transparent; border-color: var(--border-light); transform: scale(1); }
      25% { background-color: rgba(249,115,22,0.3); border-color: var(--orange-primary); transform: scale(1.01); }
      50% { background-color: rgba(249,115,22,0.15); border-color: var(--orange-primary); transform: scale(1); }
      75% { background-color: rgba(249,115,22,0.3); border-color: var(--orange-primary); transform: scale(1.01); }
      100% { background-color: transparent; border-color: var(--border-light); transform: scale(1); }
    }
    .order-highlight { animation: blinkHighlight 0.6s ease-in-out 5; box-shadow: 0 0 0 3px var(--orange-primary); border-radius: 20px; position: relative; z-index: 10; }
    .order-highlight .order-header { background: rgba(249,115,22,0.15); border-radius: 20px 20px 0 0; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    @media (max-width: 768px) {
      .order-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .order-header-left { width: 100%; justify-content: space-between; }
      .order-items-grid { gap: 12px; }
      .order-item-product { flex-direction: row; align-items: center; padding: 10px; gap: 10px; }
      .order-item-left { flex-direction: row; gap: 12px; align-items: center; }
      .order-item-img { width: 50px; height: 50px; }
      .order-item-name { font-size: 13px; }
      .order-item-price { font-size: 14px; white-space: nowrap; }
      .order-timeline { padding: 12px; overflow-x: auto; }
      .timeline-steps { min-width: 100%; gap: 8px; }
      .timeline-steps::before { top: 14px; }
      .step-icon { width: 28px; height: 28px; font-size: 11px; margin-bottom: 6px; }
      .step-label { font-size: 8px; white-space: nowrap; }
      .delivery-details-grid { grid-template-columns: 1fr; gap: 16px; }
      .info-label { width: 100px; font-size: 11px; }
      .info-value { font-size: 12px; word-break: break-word; }
      .products-grid { gap: 12px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .cat-link { width: 75px; padding: 2px 10px 10px; }
      .cat-icon { width: 50px; height: 50px; font-size: 30px; }
      .address-form-row { grid-template-columns: 1fr; }
      .contact-links { justify-content: center; }
    }
  </style>
</head>

    // ==================== ORDER HELPER FUNCTIONS ====================
    function getOrderTimeline(status) {
      const steps = [
        { name: "Order Placed", icon: "fa-check-circle" },
        { name: "Preparing", icon: "fa-utensils" },
        { name: "Shipped", icon: "fa-truck" },
        { name: "Delivered", icon: "fa-home" }
      ];
      let currentIndex = status === 'processing' ? 1 : status === 'shipped' ? 2 : status === 'delivered' ? 3 : 0;
      return steps.map((step, idx) => ({ ...step, completed: idx < currentIndex, active: idx === currentIndex }));
    }
    
    function getOrderUpdates(status, date) {
      const updates = [{ title: "Order Confirmed", date: date, icon: "fa-check-circle", color: "#2e7d32" }];
      if (status === 'processing' || status === 'shipped' || status === 'delivered') {
        updates.push({ title: "Order is being prepared", date: date, icon: "fa-utensils", color: "#f97316" });
      }
      if (status === 'shipped' || status === 'delivered') {
        updates.push({ title: "Order Shipped", date: date, icon: "fa-truck", color: "#3b82f6" });
      }
      if (status === 'delivered') {
        updates.push({ title: "Order Delivered", date: date, icon: "fa-home", color: "#2e7d32" });
      }
      return updates;
    }

      const orderPlacedDate = new Date(orderDate);

              ${isConfirmed ? `<span class="status-badge" style="background: var(--green-primary); color: white;"><i class="fas fa-check-circle"></i> Agent Assigned</span>` : `<span class="status-badge" style="background: var(--orange-primary); color: white;"><i class="fas fa-clock"></i> Awaiting Confirmation</span>`}
            </div>
            <i class="fas fa-chevron-down delivery-details-toggle"></i>
          </div>
          <div class="delivery-details-content">
            <div class="delivery-details-grid">
              <div class="delivery-section">
                <div class="delivery-section-title"><i class="fas fa-user"></i> Delivery Information</div>
                <div class="info-row"><span class="info-label">Customer Name:</span><span class="info-value">${order.userName || 'Rahul Sharma'}</span></div>
                <div class="info-row"><span class="info-label">Mobile Number:</span><span class="info-value">${order.userPhone || '+91 98765 43210'}</span></div>
                <div class="info-row"><span class="info-label">Alt Mobile No:</span><span class="info-value">${randomAltPhone}</span></div>
                <div class="info-row"><span class="info-label">Delivery Location:</span><span class="info-value">${order.address || '123, Green Park, New Delhi - 110001'}</span></div>
                <div class="info-row"><span class="info-label">Landmark:</span><span class="info-value">${order.landmark || 'Near City Mall, Opp. Metro Station'}</span></div>
                <div class="delivery-section-title" style="margin-top: 16px;"><i class="fas fa-credit-card"></i> Payment Details</div>
                <div class="info-row"><span class="info-label">Payment Status:</span><span class="info-value ${isPaid ? 'paid' : 'not-paid'}">${isPaid ? '<i class="fas fa-check-circle"></i> Paid' : '<i class="fas fa-times-circle"></i> Not Paid'}</span></div>
                <div class="info-row"><span class="info-label">Payment Method:</span><span class="info-value"><span class="payment-method"><i class="fas ${randomPaymentMethod.includes('UPI') ? 'fa-google-pay' : randomPaymentMethod.includes('Card') ? 'fa-credit-card' : randomPaymentMethod.includes('COD') ? 'fa-money-bill' : 'fa-chart-line'}"></i> ${randomPaymentMethod}</span></span></div>
                <div class="info-row"><span class="info-label">Transaction ID:</span><span class="info-value">TXN${Math.floor(Math.random() * 1000000000)}</span></div>
                <div class="info-row"><span class="info-label">Order Status:</span><span class="info-value"><span class="status-badge" style="background: ${order.status === 'delivered' ? '#2e7d32' : order.status === 'shipped' ? '#f97316' : '#1976d2'}; color: white;">${order.status.toUpperCase()}</span></span></div>
              </div>
              <div class="delivery-section">
                <div class="delivery-section-title"><i class="fas fa-motorcycle"></i> Delivery Agent Details</div>
                ${isConfirmed ? `
                  <div class="delivery-agent-card">
                    <div class="agent-status confirmed"><i class="fas fa-check-circle"></i> Agent Assigned</div>
                    <div class="info-row"><span class="info-label">Agent Name:</span><span class="info-value">${deliveryAgent.name}</span></div>
                    <div class="info-row"><span class="info-label">Contact Number:</span><span class="info-value">${deliveryAgent.phone}</span></div>
                    <div class="info-row"><span class="info-label">Agent ID:</span><span class="info-value">${deliveryAgent.agentId}</span></div>

    // ==================== ORDER ACTIONS ====================
    function cancelOrder(orderId) {
      const order = orders.find(o => o.id === orderId);
      if (order.status === 'delivered') { alert('Cannot cancel delivered orders.'); return; }
      if (confirm(`Cancel order ${orderId}?`)) { 
        order.status = 'cancelled'; 
        saveOrders(); 
        renderOrdersPage(); 
        showToast('Order cancelled successfully!');
      }
    }
    
    function reorderItems(items) {
      items.forEach(item => {
        const product = {
          id: item.productId,
          name: item.name,
          price: item.price,
          oldPrice: item.oldPrice,
          image: item.image,
          discountPercent: item.discountPercent || Math.round(((item.oldPrice - item.price) / item.oldPrice) * 100),
          qty: item.quantity
        };
        const existing = cart.find(i => i.id === product.id);
        if (existing) {
          existing.qty = (existing.qty || 0) + item.quantity;
        } else {
          cart.push(product);
        }
      });
      saveCart();
      updateCartUI();
      showToast('Items added to cart!');
      openCart();
    }
    
    function toggleOrderDetails(orderId) {
      const itemsDiv = document.getElementById(`order-items-${orderId}`);
      const header = itemsDiv?.previousElementSibling;
      if (itemsDiv) { 
        itemsDiv.classList.toggle('expanded'); 
        if (header) header.classList.toggle('expanded'); 
      }
    }

        savedAddresses = saved ? JSON.parse(saved) : [];

      return savedAddresses;

      if (form) form.onsubmit = (e) => { e.preventDefault(); saveAddressFromModal(); };
    }
    
    function selectAddressFromList(addressId) {
      const address = savedAddresses.find(a => a.id === addressId);
      if (address) {
        document.getElementById('editFullName').value = address.name || '';
        document.getElementById('editPhone').value = address.phone || '';
        document.getElementById('editAddressText').value = address.address || '';
        document.getElementById('editPincode').value = address.pincode || '';
        document.getElementById('editLandmark').value = address.landmark || '';
        document.getElementById('editAddressId').value = address.id;
        document.querySelectorAll('.address-select-item').forEach(item => {
          item.classList.remove('selected');
          if (item.getAttribute('data-address-id') == addressId) item.classList.add('selected');
        });
      }
    }
    
    function saveAddressFromModal() {
      const order = orders.find(o => o.id === currentEditingOrderId);
      if (!order) return;
      
      const newPhone = document.getElementById('editPhone').value;
      order.userName = document.getElementById('editFullName').value;
      order.userPhone = newPhone.startsWith('+91') ? newPhone : `+91 ${newPhone}`;
      order.address = document.getElementById('editAddressText').value;
      order.pincode = document.getElementById('editPincode').value;
      order.landmark = document.getElementById('editLandmark').value;
      order.addressId = document.getElementById('editAddressId').value || Date.now();
      order.building = document.getElementById('editAddressText').value.split(',')[0] || '';
      
      saveOrders();
      closeAddressModal();
      renderOrdersPage();
      showToast('Address updated successfully!');
    }
    
    function closeAddressModal() {
      const modal = document.getElementById('addressEditModal');
      if (modal) modal.style.display = 'none';
      currentEditingOrderId = null;
    }

        subtotal: order.subtotal,
        discount: order.discount || 0,

          showCycleNotification: true
        });
        suggestedManager.init();
      } else {
        suggestedManager.refresh();
      }
      
      // Check for highlighted order from account page
      checkForHighlightedOrder();
    }
    
    // ==================== HIGHLIGHT ORDER FROM ACCOUNT PAGE ====================
    function checkForHighlightedOrder() {
      const highlightOrderId = sessionStorage.getItem('highlightOrderId');
      if (highlightOrderId) {
        sessionStorage.removeItem('highlightOrderId');
        setTimeout(() => {
          const orderElement = document.getElementById(`order-card-${highlightOrderId}`);
          if (orderElement) {
            orderElement.classList.add('order-highlight');
            orderElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            const itemsDiv = document.getElementById(`order-items-${highlightOrderId}`);
            if (itemsDiv && !itemsDiv.classList.contains('expanded')) {
              itemsDiv.classList.add('expanded');
              const header = orderElement.querySelector('.order-header');
              if (header) header.classList.add('expanded');
            }
            setTimeout(() => orderElement.classList.remove('order-highlight'), 3500);
            showToast(`📍 Viewing order ${highlightOrderId}`);
          }
        }, 800);
      }
    }
    
    function viewProduct(productId) { 
      window.location.href = `description.html?id=${productId}`; 
    }
    
    function showToast(message) {
      let toast = document.querySelector('.order-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'order-toast';
        toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green-primary);color:white;padding:10px 20px;border-radius:40px;z-index:2000;font-size:13px;opacity:0;transition:opacity 0.3s;';
        document.body.appendChild(toast);
      }
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }
    
    function showOrdersSkeleton() {
      const container = document.getElementById('ordersContainer');
      if (container) {
        container.innerHTML = `<div class="page-header"><div class="skeleton" style="width:200px;height:32px;border-radius:8px;"></div><div class="skeleton" style="width:300px;height:16px;border-radius:8px;margin-top:8px;"></div></div><div class="orders-skeleton-list">${Array(3).fill(`<div class="order-skeleton"><div class="order-header-skeleton"><div class="id-skeleton skeleton"></div><div class="status-skeleton skeleton"></div><div class="price-skeleton skeleton"></div></div></div>`).join('')}</div>`;
      }
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // ==================== PAGE INITIALIZATION ====================
    async function initPage() {
      showOrdersSkeleton();
      await initCommon(() => {});
      loadOrders();
      renderOrdersPage();
      
      if (typeof renderSubscriptionSection === 'function') {
        await renderSubscriptionSection('subscriptionModuleContainer', 'orders', function(category) {
          if (category && category !== 'all') {
            window.location.href = `subscription.html?cat=${category}`;
          } else {
            window.location.href = 'subscription.html';
          }
        });
      }
    }
    
    // Make functions global
    window.toggleOrderDetails = toggleOrderDetails;
    window.cancelOrder = cancelOrder;
    window.editAddress = editAddress;
    window.selectAddressFromList = selectAddressFromList;
    window.closeAddressModal = closeAddressModal;
    window.viewProduct = viewProduct;
    window.toggleDeliveryDetails = toggleDeliveryDetails;
    window.reorderItems = reorderItems;
    
    initPage();
  </script>
</body>
</html>
