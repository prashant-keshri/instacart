<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FreshKart – Categories</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="common.css">
  <style>
    .filter-capsules { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; justify-content: center; }
    .filter-capsule { padding: 8px 20px; border-radius: 40px; background: var(--surface); border: 1px solid var(--border-light); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .filter-capsule.active { background: var(--orange-primary); color: white; border-color: var(--orange-primary); }
    .category-cards-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; margin: 20px 0; }
    .category-card { display: flex; flex-direction: column; align-items: center; padding: 8px 12px; background: var(--surface); border-radius: 16px; cursor: pointer; border: 1px solid var(--border-light); min-width: 80px; transition: all 0.2s; }
    .category-card.active { border-color: var(--orange-primary); background: var(--bg-primary); }
    .category-card-icon { font-size: 32px; margin-bottom: 6px; }
    .category-card span { font-size: 11px; font-weight: 500; }
    .show-more-btn { display: block; margin: 30px auto; background: var(--blue-primary); color: white; border: none; padding: 10px 28px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .show-more-btn:hover { opacity: 0.9; transform: scale(0.98); }
    .show-more-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    /* Subscription section styles */
    .subscription-products-section {
      margin: 40px 0;
    }
    .subscription-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }
    .subscription-header-bar h2 {
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .view-all-link {
      color: var(--orange-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .view-all-link:hover {
      text-decoration: underline;
    }
    .subscription-products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .subscription-home-card {
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border-light);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
    }
    .subscription-home-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .subscription-home-card .card-image {
      position: relative;
      height: 180px;
      overflow: hidden;
    }
    .subscription-home-card .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .subscription-home-card:hover .card-image img {
      transform: scale(1.05);
    }
    .subscription-type-tag {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--orange-primary);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      z-index: 2;
    }
    .subscription-home-card .card-content {
      padding: 15px;
    }
    .subscription-home-card .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subscription-home-card .card-price {
      font-size: 22px;
      font-weight: 800;
      color: var(--green-primary);
      margin-bottom: 5px;
    }
    .subscription-home-card .card-old-price {
      text-decoration: line-through;
      color: var(--text-muted);
      font-size: 13px;
      margin-left: 8px;
    }
    .subscription-home-card .card-discount {
      background: var(--red-primary);
      color: white;
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 10px;
      margin-left: 8px;
    }
    .subscription-home-card .card-delivery {
      font-size: 12px;
      color: var(--text-muted);
      margin: 8px 0;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .subscription-home-card .card-features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }
    .subscription-home-card .feature {
      font-size: 10px;
      background: var(--bg-primary);
      padding: 3px 8px;
      border-radius: 20px;
      color: var(--text-secondary);
    }
    .sub-home-add-btn {
      width: 100%;
      background: var(--green-primary);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s;
      position: relative;
      z-index: 10;
    }
    .sub-home-add-btn:hover {
      opacity: 0.9;
      transform: scale(0.98);
    }
    @media (max-width: 768px) {
      .subscription-products-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-theme="dark">
  <button class="dark-mode-toggle" id="darkModeToggle" onclick="toggleDarkMode()"><i class="fas fa-sun"></i></button>
  
  <!-- Top Bar -->
  <div class="top-bar"><div class="container"><div class="top-left"><span><i class="fas fa-truck"></i> Free delivery > ₹499</span><span><i class="fas fa-leaf"></i> 100% Fresh</span></div><div class="top-right"><span><i class="fas fa-headset"></i> 24/7 Support</span><span><i class="fas fa-download"></i> App</span></div></div></div>

  <!-- Header -->
  <header class="main-header"><div class="container"><div class="logo-row"><div class="logo"><h1>Fresh<span>Kart</span></h1><p style="font-size:10px;">Grocery Delivery</p></div><div class="mobile-cart-icon" id="mobileCartIcon"><i class="fas fa-shopping-cart"></i> <span id="mobileCartCount">0</span></div></div><div class="search-location"><div class="search-bar"><i class="fas fa-search"></i><input type="text" id="globalSearch" placeholder="Search products..."></div><div class="location-selector"><i class="fas fa-map-marker-alt"></i><select id="locationSelect"><option>📍 Delhi 110001</option><option>📍 Mumbai 400001</option><option>📍 Bangalore 560001</option></select></div></div><div class="desktop-cart"><button class="cart-btn" id="cartBtn"><i class="fas fa-shopping-cart"></i><span>Cart</span><span class="cart-count" id="cartCount">0</span></button></div></div></header>

  <!-- Main Content -->
  <main class="container">
    <div class="filter-capsules" id="filterCapsules"></div>
    <div class="category-cards-grid" id="categoryCardsGrid"></div>
    <div class="section-header"><h2 id="categoryTitle"><i class="fas fa-tag"></i> All Products</h2></div>
    <div class="products-grid" id="categoryProductsGrid"></div>
    <button class="show-more-btn" id="loadMoreCatBtn">Show More →</button>
   
  <!-- Subscription Section -->
<div id="subscriptionModuleContainer"></div>

    <!-- ==================== SUBSCRIPTION PLANS SECTION (UPDATED - MATCHES INDEX PAGE) ==================== -->
    <div class="subscription-products-section" style="margin: 40px 0;">
      <div class="subscription-header-bar">
        <h2><i class="fas fa-calendar-check"></i> 🔥 Popular Subscription Plans</h2>
        <a href="subscription.html" class="view-all-link">View All Plans <i class="fas fa-arrow-right"></i></a>
      </div>
      <div id="categorySubscriptionProducts" class="subscription-products-grid">
        <!-- Subscription products will be loaded here dynamically -->
      </div>
    </div>

    <!-- ==================== SECTION: DEAL ZONE ==================== -->
    <div class="section-header"><h2><i class="fas fa-fire"></i> 🔥 Deal Zone - 30%+ OFF</h2></div>
    <div class="products-grid" id="dealZoneGrid"></div>
    <button class="show-more-btn" id="loadMoreDealBtn">Show More Deals →</button>
    
    <!-- ==================== SECTION: YOU MAY ALSO LIKE ==================== -->
    <div class="section-header"><h2><i class="fas fa-star"></i> You May Also Like</h2></div>
    <div class="products-grid" id="youMayAlsoLikeGrid"></div>
    <button class="show-more-btn" id="loadMoreAlsoBtn">Show More →</button>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav"><a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a><a href="orders.html" class="nav-item"><i class="fas fa-shopping-bag"></i><span>Orders</span></a><a href="categories.html" class="nav-item active"><i class="fas fa-th-large"></i><span>Category</span></a><a href="account.html" class="nav-item"><i class="fas fa-user"></i><span>Account</span></a><a href="#" class="nav-item" id="bottomCartBtn"><div class="cart-badge-wrapper"><i class="fas fa-shopping-cart"></i><span class="bottom-cart-count" id="bottomCartCount">0</span></div><span>Cart</span></a></nav>

  <!-- Cart Sidebar -->
  <div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><h3>My Cart</h3><button class="close-cart" id="closeCartBtn">&times;</button></div><div class="cart-items" id="cartItemsList"></div><div class="cart-footer"><div id="priceBreakdownBox" class="price-breakdown"></div><button class="checkout-btn" id="checkoutBtn">Place Order</button></div></div>
  <div class="overlay" id="overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="common.js"></script>
  <script>
    // ==================== CATEGORIES PAGE SPECIFIC CODE ====================
    let currentCategory = "all";
    let categoryManager = null;
    let dealManager = null;
    let alsoManager = null;
    
    // Define categories list for the page
    const categoriesList = [
      { name: "All", icon: "fa-th-large", cat: "all", emoji: "📦" },
      { name: "Fruits", icon: "fa-apple", cat: "fruits", emoji: "🍎" },
      { name: "Vegetables", icon: "fa-carrot", cat: "vegetables", emoji: "🥬" },
      { name: "Beverages", icon: "fa-mug-saucer", cat: "beverages", emoji: "🥤" },
      { name: "Cakes", icon: "fa-cake-candles", cat: "cakes", emoji: "🎂" },
      { name: "Ice Cream", icon: "fa-ice-cream", cat: "icecream", emoji: "🍦" },
      { name: "Meals", icon: "fa-utensils", cat: "meals", emoji: "🍛" },
      { name: "Meats", icon: "fa-drumstick-bite", cat: "meats", emoji: "🍗" },
      { name: "Dairy", icon: "fa-cheese", cat: "dairy", emoji: "🥛" },
      { name: "Bakery", icon: "fa-bread-slice", cat: "bakery", emoji: "🥖" },
      { name: "Staples", icon: "fa-box", cat: "staples", emoji: "🍚" },
      { name: "Groceries", icon: "fa-basket-shopping", cat: "groceries", emoji: "🛒" },
      { name: "Subscriptions", icon: "fa-calendar-check", cat: "subscription", emoji: "📦" }
    ];
    
    // ==================== CATEGORY RENDER FUNCTIONS ====================
    function renderFilterCapsules() {
      const container = document.getElementById('filterCapsules');
      if (!container) return;
      
      container.innerHTML = categoriesList.map(cat => 
        `<button class="filter-capsule ${currentCategory === cat.cat ? 'active' : ''}" data-category="${cat.cat}" onclick="filterByCategory('${cat.cat}')">
          <i class="fas ${cat.icon}"></i> ${cat.name}
        </button>`
      ).join('');
    }
    
    function renderCategoryCards() {
      const container = document.getElementById('categoryCardsGrid');
      if (!container) return;
      
      container.innerHTML = categoriesList.map(cat => 
        `<div class="category-card ${currentCategory === cat.cat ? 'active' : ''}" data-category="${cat.cat}" onclick="filterByCategory('${cat.cat}')">
          <div class="category-card-icon">${cat.emoji}</div>
          <span>${cat.name}</span>
        </div>`
      ).join('');
    }
    
    // ==================== PRODUCT FILTERING FUNCTIONS ====================
    function getCategoryProducts() {
      if (!window.allProducts) return [];
      if (currentCategory === "all") return window.allProducts;
      return window.allProducts.filter(p => p.category === currentCategory);
    }
    
    function getDealProducts() {
      if (!window.allProducts) return [];
      return window.allProducts.filter(p => p.discountPercent >= 30);
    }
    
    function getRandomProducts() {
      if (!window.allProducts) return [];
      return [...window.allProducts];
    }
    
    // ==================== LOAD SUBSCRIPTION PRODUCTS ====================
    async function loadCategorySubscriptionProducts() {
      const container = document.getElementById('categorySubscriptionProducts');
      if (!container) return;
      
      try {
        const response = await fetch('product.json');
        const data = await response.json();
        // Get first 3 subscription products
        const subscriptions = data.products.filter(p => p.category === "subscription").slice(0, 3);
        
        if (subscriptions.length === 0) {
          container.innerHTML = '<p style="text-align:center;">No subscription plans available</p>';
          return;
        }
        
        container.innerHTML = subscriptions.map(sub => {
          const discount = sub.discountPercent || Math.round(((sub.oldPrice - sub.price) / sub.oldPrice) * 100);
          const typeIcon = sub.subscriptionType === 'daily' ? 'fa-sun' : (sub.subscriptionType === 'weekly' ? 'fa-calendar-week' : 'fa-calendar-alt');
          const typeText = sub.subscriptionType === 'daily' ? 'Daily' : (sub.subscriptionType === 'weekly' ? 'Weekly' : 'Monthly');
          
          return `
            <div class="subscription-home-card" onclick="viewProduct(${sub.id})">
              <div class="card-image">
                <img src="${sub.image}" alt="${sub.name}" onerror="this.src='https://placehold.co/300x200'">
                <div class="subscription-type-tag"><i class="fas ${typeIcon}"></i> ${typeText}</div>
              </div>
              <div class="card-content">
                <div class="card-title">${sub.name}</div>
                <div class="card-price">
                  ₹${sub.price}
                  <span class="card-old-price">₹${sub.oldPrice || sub.price + Math.round(sub.price * 0.3)}</span>
                  <span class="card-discount">${discount}% OFF</span>
                </div>
                <div class="card-delivery"><i class="fas fa-truck"></i> ${sub.deliverySchedule || 'Flexible delivery'}</div>
                <div class="card-features">
                  ${(sub.benefits || ['Fresh delivery', 'Skip anytime', 'Easy cancellation']).slice(0, 2).map(b => `<span class="feature"><i class="fas fa-check-circle"></i> ${b.length > 20 ? b.substring(0, 20) + '...' : b}</span>`).join('')}
                </div>
                <button class="sub-home-add-btn" onclick="event.stopPropagation();addSubscriptionToCart(${sub.id})">
                  <i class="fas fa-shopping-cart"></i> Subscribe Now
                </button>
              </div>
            </div>
          `;
        }).join('');
      } catch(e) {
        console.error('Error loading subscription products:', e);
        container.innerHTML = '<p style="text-align:center;">Unable to load subscription plans</p>';
      }
    }
    
    // ==================== ADD SUBSCRIPTION TO CART ====================
    async function addSubscriptionToCart(productId) {
      try {
        const response = await fetch('product.json');
        const data = await response.json();
        const product = data.products.find(p => p.id === productId);
        
        if (product) {
          const existing = cart.find(i => i.id === product.id);
          if (existing) {
            if ((existing.qty || 0) + 1 > SITE_CONFIG.MAX_CART_QUANTITY) {
              alert(`Max ${SITE_CONFIG.MAX_CART_QUANTITY} allowed`);
              return;
            }
            existing.qty = (existing.qty || 0) + 1;
          } else {
            cart.push({
              id: product.id,
              name: product.name,
              price: product.price,
              oldPrice: product.oldPrice,
              discountPercent: product.discountPercent,
              image: product.image,
              qty: 1,
              isSubscription: true,
              subscriptionType: product.subscriptionType,
              deliverySchedule: product.deliverySchedule
            });
          }
          saveCart();
          updateCartUI();
          showToastMessage(`${product.name} added to cart!`);
        }
      } catch(e) {
        console.error('Error adding to cart:', e);
        alert('Error adding to cart. Please try again.');
      }
    }
    
    function showToastMessage(message) {
      let toast = document.querySelector('.category-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'category-toast';
        toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green-primary);color:white;padding:10px 20px;border-radius:40px;z-index:2000;font-size:13px;opacity:0;transition:opacity 0.3s;';
        document.body.appendChild(toast);
      }
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }
    
    // ==================== CATEGORY FILTER FUNCTION ====================
    function filterByCategory(cat) {
      currentCategory = cat;
      
      // Update active states for pills
      document.querySelectorAll('.filter-capsule').forEach(btn => {
        if (btn.getAttribute('data-category') === cat) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
      
      // Update active states for cards
      document.querySelectorAll('.category-card').forEach(card => {
        if (card.getAttribute('data-category') === cat) {
          card.classList.add('active');
        } else {
          card.classList.remove('active');
        }
      });
      
      // Refresh the products grid
      if (categoryManager) categoryManager.refresh();
      
      // Update title
      const categoryName = categoriesList.find(c => c.cat === cat)?.name || 'All Products';
      document.getElementById('categoryTitle').innerHTML = `<i class="fas fa-tag"></i> ${categoryName}`;
    }
    
    // ==================== VIEW PRODUCT ====================
    function viewProduct(productId) {
      window.location.href = `description.html?id=${productId}`;
    }
    
    // ==================== SKELETON FUNCTIONS ====================
    function showCategorySkeleton() {
      if (typeof showProductsSkeleton === 'function') {
        showProductsSkeleton('categoryProductsGrid', 12);
        showProductsSkeleton('dealZoneGrid', 8);
        showProductsSkeleton('youMayAlsoLikeGrid', 8);
      }
    }
    // ==================== RENDER SUBSCRIPTION SECTION ON CATEGORIES PAGE ====================
async function renderCategoriesSubscriptionSection() {
  if (typeof renderSubscriptionSection === 'function') {
    await renderSubscriptionSection('subscriptionModuleContainer', 'categories', function(category) {
      if (category && category !== 'all') {
        window.location.href = `subscription.html?cat=${category}`;
      } else {
        window.location.href = 'subscription.html';
      }
    });
  }
}


// ==================== PAGE INITIALIZATION ====================
async function initPage() {
  showCategorySkeleton();
  
  await initCommon(() => {});
  
  // Get category from URL
  const urlParams = new URLSearchParams(window.location.search);
  const catFromUrl = urlParams.get('cat');
  if (catFromUrl && categoriesList.some(c => c.cat === catFromUrl)) {
    currentCategory = catFromUrl;
  }
  
  // Render categories
  renderFilterCapsules();
  renderCategoryCards();
  
  // Load subscription products
  await loadCategorySubscriptionProducts();
  // Call this in initPage after loading products
  await renderCategoriesSubscriptionSection();
  
      // Initialize Show More Managers
      categoryManager = createShowMoreManager('categoryProducts', 'categoryProductsGrid', 'loadMoreCatBtn', getCategoryProducts, {
        initialItems: 12,
        loadMoreItems: 6,
        maxCycles: 10,
        showCycleNotification: true
      });
      categoryManager.init();
      
      dealManager = createShowMoreManager('dealProducts', 'dealZoneGrid', 'loadMoreDealBtn', getDealProducts, {
        initialItems: 8,
        loadMoreItems: 4,
        maxCycles: 5,
        showCycleNotification: true
      });
      dealManager.init();
      
      alsoManager = createShowMoreManager('alsoLikeProducts', 'youMayAlsoLikeGrid', 'loadMoreAlsoBtn', getRandomProducts, {
        initialItems: 8,
        loadMoreItems: 4,
        maxCycles: 5,
        showCycleNotification: true
      });
      alsoManager.init();
      
      // Update title
      const categoryName = categoriesList.find(c => c.cat === currentCategory)?.name || 'All Products';
      document.getElementById('categoryTitle').innerHTML = `<i class="fas fa-tag"></i> ${categoryName}`;
    }
    
    // Make functions available globally
    window.filterByCategory = filterByCategory;
    window.addSubscriptionToCart = addSubscriptionToCart;
    window.viewProduct = viewProduct;
    
    // Start the page
    initPage();

  </script>
</body>
</html>
