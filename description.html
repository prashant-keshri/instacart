<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FreshKart – Product Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="common.css">
  <style>
    .breadcrumb { margin: 20px 0; font-size: 13px; }
    .breadcrumb a { color: var(--orange-primary); text-decoration: none; }
    .product-detail-wrapper { background: var(--surface); border-radius: 24px; padding: 30px; margin: 20px 0; border: 1px solid var(--border-light); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
    @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; gap: 32px; } .product-detail-wrapper { padding: 20px; } }
    .product-gallery { position: sticky; top: 100px; }
    @media (max-width: 900px) { .product-gallery { position: relative; top: 0; } }
    .main-image-container { background: var(--bg-primary); border-radius: 20px; overflow: hidden; border: 1px solid var(--border-light); }
    .main-image-container img { width: 100%; height: auto; display: block; aspect-ratio: 1 / 1; }
    .thumbnail-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .thumb { width: 80px; height: 80px; border-radius: 12px; overflow: hidden; cursor: pointer; border: 2px solid transparent; background: var(--bg-primary); }
    .thumb.active { border-color: var(--orange-primary); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .product-info-detail h1 { font-size: 28px; margin-bottom: 12px; }
    @media (max-width: 600px) { .product-info-detail h1 { font-size: 22px; } }
    .rating-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .stars { color: #fbbf24; letter-spacing: 2px; }
    .price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .current-price { font-size: 32px; font-weight: 800; color: var(--green-primary); }
    .old-price { text-decoration: line-through; color: var(--text-muted); font-size: 18px; }
    .discount-badge { background: var(--red-primary); color: white; padding: 4px 10px; border-radius: 30px; font-size: 13px; font-weight: 600; }
    .stock-status { display: inline-flex; align-items: center; gap: 6px; background: #e8f5e9; color: #2e7d32; padding: 6px 12px; border-radius: 30px; font-size: 13px; font-weight: 600; margin-bottom: 20px; }
    .product-description { line-height: 1.6; color: var(--text-secondary); margin: 20px 0; }
    .info-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
    .info-card { background: var(--bg-primary); padding: 12px; border-radius: 16px; }
    .info-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
    .info-value { font-weight: 600; font-size: 14px; margin-top: 4px; }
    .benefits-list { list-style: none; margin: 16px 0; }
    .benefits-list li { padding: 8px 0; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-light); }
    .benefits-list li i { color: var(--green-primary); width: 20px; }
    .variant-selector { margin: 16px 0; }
    .variant-selector select { width: 100%; padding: 12px 16px; border-radius: 40px; border: 1px solid var(--border-light); background: var(--surface); color: var(--text-primary); }
    .quantity-wrapper { display: flex; align-items: center; gap: 16px; margin: 20px 0; }
    .qty-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-light); background: var(--bg-primary); cursor: pointer; font-size: 18px; }
    .qty-input { width: 60px; text-align: center; font-size: 18px; font-weight: 600; background: transparent; border: none; color: var(--text-primary); }
    .action-buttons { display: flex; gap: 16px; margin-top: 24px; flex-wrap: wrap; }
    .buy-now { flex: 1; background: var(--orange-primary); color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 700; cursor: pointer; }
    .add-to-cart-detail { flex: 1; background: var(--green-primary); color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 700; cursor: pointer; }
    .wishlist-detail { width: 50px; background: var(--surface); border: 1px solid var(--border-light); border-radius: 50%; cursor: pointer; font-size: 20px; color: #ff6b6b; }
    .category-boxes-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 20px 0; }
    .cat-box { padding: 2px 15px 15px; width: 90px; display: flex; flex-direction: column; align-items: center; background: var(--surface); border-radius: 15px; cursor: pointer; border: 1px solid var(--border-light); transition: transform 0.2s; }
    .cat-box:hover { transform: translateY(-4px); }
    .cat-box-icon { width: 60px; height: 60px; background: var(--bg-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; margin-bottom: 6px; margin-top: 8px; }
    .show-more-btn { display: block; margin: 30px auto; background: var(--blue-primary); color: white; border: none; padding: 10px 28px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .show-more-btn:hover { opacity: 0.9; transform: scale(0.98); }
    .show-more-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 18px; margin-bottom: 20px; }
  </style>
</head>
<body data-theme="dark">
  <button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-sun"></i></button>

  <!-- Top Bar -->
  <div class="top-bar"><div class="container"><div class="top-left"><span><i class="fas fa-truck"></i> Free delivery > ₹499</span><span><i class="fas fa-leaf"></i> 100% Fresh</span></div><div class="top-right"><span><i class="fas fa-headset"></i> 24/7 Support</span><span><i class="fas fa-download"></i> App</span></div></div></div>

  <!-- Header -->
  <header class="main-header"><div class="container"><div class="logo-row"><div class="logo"><h1>Fresh<span>Kart</span></h1><p style="font-size:10px;">Grocery Delivery</p></div><div class="mobile-cart-icon" id="mobileCartIcon"><i class="fas fa-shopping-cart"></i> <span id="mobileCartCount">0</span></div></div><div class="search-location"><div class="search-bar"><i class="fas fa-search"></i><input type="text" id="globalSearch" placeholder="Search fruits, veggies, juices..."></div><div class="location-selector"><i class="fas fa-map-marker-alt"></i><select id="locationSelect"><option>📍 Delhi 110001</option><option>📍 Mumbai 400001</option><option>📍 Bangalore 560001</option></select></div></div><div class="desktop-cart"><button class="cart-btn" id="cartBtn"><i class="fas fa-shopping-cart"></i><span>Cart</span><span class="cart-count" id="cartCount">0</span></button></div></div></header>

  <!-- Main Content -->
  <main class="container" id="productDetailContainer"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading product details...</div></main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav"><a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a><a href="orders.html" class="nav-item"><i class="fas fa-shopping-bag"></i><span>Orders</span></a><a href="categories.html" class="nav-item"><i class="fas fa-th-large"></i><span>Category</span></a><a href="account.html" class="nav-item"><i class="fas fa-user"></i><span>Account</span></a><a href="#" class="nav-item" id="bottomCartBtn"><div class="cart-badge-wrapper"><i class="fas fa-shopping-cart"></i><span class="bottom-cart-count" id="bottomCartCount">0</span></div><span>Cart</span></a></nav>

  <!-- Cart Sidebar -->
  <div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><h3>My Cart</h3><button class="close-cart" id="closeCartBtn">&times;</button></div><div class="cart-items" id="cartItemsList"></div><div class="cart-footer"><div id="priceBreakdownBox" class="price-breakdown"></div><button class="checkout-btn" id="checkoutBtn">Place Order</button></div></div>
  <div class="overlay" id="overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="common.js"></script>
  <script>
    let productData = null;
    let currentProduct = null;
    let quantity = 1;
    let selectedVariant = null;
    let relatedManager = null;
    let alsoManager = null;
    
    const categoryBoxes = [
      { name: "Fruits", icon: "🍎", cat: "fruits" },
      { name: "Vegetables", icon: "🥬", cat: "vegetables" },
      { name: "Beverages", icon: "🥤", cat: "beverages" },
      { name: "Cakes", icon: "🎂", cat: "cakes" },
      { name: "Ice Cream", icon: "🍦", cat: "icecream" },
      { name: "Snacks", icon: "🍿", cat: "snacks" }
    ];
    
    async function loadProductData() {
      try {
        const response = await fetch('product.json');
        const data = await response.json();
        productData = data;
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        if (productId) {
          currentProduct = data.products.find(p => p.id === productId);
          if (currentProduct) {
            renderProductDetail();
            // Setup show more managers after render
            setupShowMoreManagers();
          } else {
            document.getElementById('productDetailContainer').innerHTML = '<div class="loading">Product not found</div>';
          }
        } else {
          document.getElementById('productDetailContainer').innerHTML = '<div class="loading">No product selected</div>';
        }
      } catch (error) {
        document.getElementById('productDetailContainer').innerHTML = '<div class="loading">Error loading product. Ensure product.json exists.</div>';
      }
    }
    
    function renderProductDetail() {
      const container = document.getElementById('productDetailContainer');
      const mainImage = currentProduct.images?.[0] || currentProduct.image;
      const isWishlisted = wishlist.includes(currentProduct.id);
      const discountValue = Math.round(((currentProduct.oldPrice - currentProduct.price) / currentProduct.oldPrice) * 100);
      
      container.innerHTML = `
        <div class="breadcrumb"><a href="index.html">Home</a> / <a href="categories.html?cat=${currentProduct.category}">${currentProduct.category}</a> / <span>${currentProduct.name}</span></div>
        <div class="product-detail-wrapper"><div class="detail-grid">
          <div class="product-gallery"><div class="main-image-container"><img id="mainProductImage" src="${mainImage}" alt="${currentProduct.name}"></div><div class="thumbnail-row" id="thumbnailList"></div></div>
          <div class="product-info-detail">
            <h1>${currentProduct.name}</h1>
            <div class="rating-row"><div class="stars">${'★'.repeat(Math.floor(currentProduct.rating))}${'☆'.repeat(5 - Math.floor(currentProduct.rating))}</div><div>${currentProduct.rating} (${currentProduct.ratingCount} ratings)</div></div>
            <div class="price-row"><span class="current-price">₹${currentProduct.price}</span><span class="old-price">₹${currentProduct.oldPrice}</span><span class="discount-badge">${discountValue}% OFF</span></div>
            <div class="stock-status"><i class="fas fa-check-circle"></i> ${currentProduct.inStock ? 'In Stock' : 'Out of Stock'}</div>
            <p class="product-description">${currentProduct.description}</p>
            <div class="info-cards">
              <div class="info-card"><div class="info-label">Brand</div><div class="info-value">${currentProduct.brand}</div></div>
              <div class="info-card"><div class="info-label">Origin</div><div class="info-value">${currentProduct.origin}</div></div>
              <div class="info-card"><div class="info-label">Unit</div><div class="info-value">${currentProduct.unit}</div></div>
              <div class="info-card"><div class="info-label">Shelf Life</div><div class="info-value">${currentProduct.shelfLife}</div></div>
              <div class="info-card"><div class="info-label">In Stock</div><div class="info-value">${currentProduct.stockQuantity || 500} units</div></div>
              <div class="info-card"><div class="info-label">Seller</div><div class="info-value">${currentProduct.seller || 'FreshKart Direct'}</div></div>
            </div>
            <h4><i class="fas fa-heart"></i> Key Benefits</h4>
            <ul class="benefits-list">${currentProduct.benefits.map(b => `<li><i class="fas fa-leaf"></i> ${b}</li>`).join('')}</ul>
            <div class="info-card"><div class="info-label">Storage Tips</div><div class="info-value">💡 ${currentProduct.storageTips}</div></div>
            ${currentProduct.variants ? `<div class="variant-selector"><select id="variantSelect"><option value="">Select variant</option>${currentProduct.variants.map(v => `<option value='${JSON.stringify(v)}'>${v.size} - ₹${v.price}</option>`).join('')}</select></div>` : ''}
            <div class="quantity-wrapper"><button class="qty-btn" id="qtyMinus">-</button><input type="number" id="qtyInput" class="qty-input" value="1" min="1" max="${currentProduct.maxQuantity || 20}"><button class="qty-btn" id="qtyPlus">+</button></div>
            <div class="action-buttons"><button class="buy-now" id="buyNowBtn"><i class="fas fa-bolt"></i> Buy Now</button><button class="add-to-cart-detail" id="addToCartDetail"><i class="fas fa-shopping-cart"></i> Add to Cart</button><button class="wishlist-detail" id="wishlistDetailBtn"><i class="${isWishlisted ? 'fas' : 'far'} fa-heart"></i></button></div>
          </div>
        </div></div>
        <div class="section-header"><h2><i class="fas fa-th-large"></i> Shop by Category</h2></div>
        <div class="category-boxes-grid" id="categoryBoxes"></div>
        <div class="section-header"><h2><i class="fas fa-layer-group"></i> Related Products</h2></div>
        <div class="products-grid" id="relatedProducts"></div>
        <button class="show-more-btn" id="loadMoreRelated" style="display: none;">Show More Related →</button>
        <div class="section-header"><h2><i class="fas fa-fire"></i> You May Also Like</h2></div>
        <div class="products-grid" id="alsoLike"></div>
        <button class="show-more-btn" id="loadMoreAlso" style="display: none;">Show More →</button>
      `;
      
      if (currentProduct.images?.length > 1) {
        document.getElementById('thumbnailList').innerHTML = currentProduct.images.map((img, idx) => `<div class="thumb ${idx === 0 ? 'active' : ''}" onclick="document.getElementById('mainProductImage').src='${img}'; document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active')); this.classList.add('active')"><img src="${img}"></div>`).join('');
      }
      
      document.getElementById('qtyMinus').onclick = () => { if (quantity > 1) { quantity--; document.getElementById('qtyInput').value = quantity; } };
      document.getElementById('qtyPlus').onclick = () => { if (quantity < (currentProduct.maxQuantity || 20)) { quantity++; document.getElementById('qtyInput').value = quantity; } };
      
      if (currentProduct.variants) {
        document.getElementById('variantSelect').onchange = (e) => {
          if (e.target.value) { selectedVariant = JSON.parse(e.target.value); document.querySelector('.current-price').innerText = `₹${selectedVariant.price}`; }
        };
      }
      
      document.getElementById('addToCartDetail').onclick = () => addToCartDetail(currentProduct.id, quantity, selectedVariant);
      document.getElementById('buyNowBtn').onclick = () => { addToCartDetail(currentProduct.id, quantity, selectedVariant); openCart(); };
      document.getElementById('wishlistDetailBtn').onclick = () => toggleWishlistDetail(currentProduct.id);
      
      renderCategoryBoxes();
    }
    
    function setupShowMoreManagers() {
      // Setup Related Products Show More Manager
      if (!relatedManager) {
        relatedManager = createShowMoreManager('relatedProducts', 'relatedProducts', 'loadMoreRelated', getRelatedProducts, {
          initialItems: 4,
          loadMoreItems: 4,
          maxCycles: 5,
          showCycleNotification: false
        });
        relatedManager.init();
      }
      
      // Setup Also Like Show More Manager
      if (!alsoManager) {
        alsoManager = createShowMoreManager('alsoLikeProducts', 'alsoLike', 'loadMoreAlso', getAlsoLikeProducts, {
          initialItems: 4,
          loadMoreItems: 4,
          maxCycles: 5,
          showCycleNotification: false
        });
        alsoManager.init();
      }
    }
    
    function getRelatedProducts() {
      return productData.products.filter(p => p.category === currentProduct.category && p.id !== currentProduct.id);
    }
    
    function getAlsoLikeProducts() {
      return productData.products.filter(p => p.id !== currentProduct.id);
    }
    
    function addToCartDetail(productId, qty, variant) {
      let product = productData.products.find(p => p.id === productId);
      let price = variant ? variant.price : product.price;
      let name = variant ? `${product.name} (${variant.size})` : product.name;
      let existing = cart.find(i => i.id === productId);
      if (existing) {
        existing.qty += qty;
        if (existing.qty > 20) existing.qty = 20;
      } else {
        cart.push({ id: productId, name: name, price: price, image: product.image, oldPrice: product.oldPrice, discountPercent: product.discountPercent, qty: qty });
      }
      saveCart();
      updateCartUI();
      alert(`${name} added to cart!`);
    }
    
    function toggleWishlistDetail(id) {
      let idx = wishlist.indexOf(id);
      if (idx === -1) wishlist.push(id);
      else wishlist.splice(idx, 1);
      saveWishlist();
      document.getElementById('wishlistDetailBtn').innerHTML = `<i class="${wishlist.includes(id) ? 'fas' : 'far'} fa-heart"></i>`;
      if (relatedManager) relatedManager.refresh();
      if (alsoManager) alsoManager.refresh();
    }
    
    function renderCategoryBoxes() {
      document.getElementById('categoryBoxes').innerHTML = categoryBoxes.map(c => `<div class="cat-box" onclick="window.location.href='categories.html?cat=${c.cat}'"><div class="cat-box-icon">${c.icon}</div><span>${c.name}</span></div>`).join('');
    }
    
    function initPage() { 
      loadProductData(); 
      initCommon([], () => {}); 
    }
    
    window.toggleWishlistDetail = toggleWishlistDetail;
    initPage();
  </script>
</body>
</html>
