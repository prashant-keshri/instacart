<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FreshKart – My Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="common.css">
  <style>
    /* ==================== COMPLETE ACCOUNT PAGE STYLES ==================== */
/* Copy everything below and paste at the END of your common.css file */

/* Account Container Layout */
.account-container {
  display: flex;
  gap: 24px;
  margin: 24px 0;
  min-height: calc(100vh - 200px);
}

@media (max-width: 768px) {
  .account-container {
    flex-direction: column;
    gap: 16px;
  }
}

/* Account Sidebar */
.account-sidebar {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border-radius: 20px;
  border: 1px solid var(--border-light);
  overflow: hidden;
  position: sticky;
  top: 80px;
  height: fit-content;
}

@media (max-width: 768px) {
  .account-sidebar {
    width: 100%;
    position: static;
  }
}

/* Profile Header */
.profile-header {
  padding: 24px 20px;
  background: linear-gradient(135deg, var(--orange-primary), var(--green-primary));
  text-align: center;
}

.profile-avatar {
  width: 80px;
  height: 80px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  border: 3px solid white;
}

.profile-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.profile-avatar i {
  font-size: 40px;
  color: white;
}

.profile-name {
  color: white;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.profile-email {
  color: rgba(255, 255, 255, 0.9);
  font-size: 12px;
}

/* Sidebar Menu */
.sidebar-menu {
  list-style: none;
  padding: 8px 0;
  margin: 0;
}

.sidebar-menu li {
  margin: 0;
}

.sidebar-menu li a {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}

.sidebar-menu li a i {
  width: 22px;
  font-size: 18px;
}

.sidebar-menu li a:hover {
  background: var(--bg-primary);
  color: var(--orange-primary);
}

.sidebar-menu li a.active {
  background: rgba(249, 115, 22, 0.1);
  color: var(--orange-primary);
  border-right: 3px solid var(--orange-primary);
}

/* Account Main Content */
.account-main {
  flex: 1;
  background: var(--surface);
  border-radius: 20px;
  border: 1px solid var(--border-light);
  padding: 28px;
}

@media (max-width: 768px) {
  .account-main {
    padding: 20px;
  }
}

@media (max-width: 480px) {
  .account-main {
    padding: 16px;
  }
}

/* Section Headers */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.section-header h2 {
  font-size: 22px;
  font-weight: 700;
  margin: 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-header h2 i {
  color: var(--orange-primary);
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--bg-primary);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border-light);
}

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
  border-color: var(--orange-primary);
}

.stat-icon {
  font-size: 32px;
  color: var(--orange-primary);
  margin-bottom: 12px;
}

.stat-value {
  font-size: 28px;
  font-weight: 800;
  color: var(--text-primary);
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 6px;
}

/* Order Cards */
.orders-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.order-card {
  background: var(--bg-primary);
  border-radius: 16px;
  padding: 16px;
  border: 1px solid var(--border-light);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.order-card:hover {
  transform: translateX(5px);
  border-color: var(--orange-primary);
  background: rgba(249, 115, 22, 0.03);
}

.order-info {
  flex: 1;
}

.order-id {
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.order-date {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.order-total {
  font-weight: 800;
  font-size: 20px;
  color: var(--green-primary);
}

/* Order Status Colors */
.order-status {
  padding: 4px 12px;
  border-radius: 30px;
  font-size: 11px;
  font-weight: 600;
}

.status-delivered {
  background: #e8f5e9;
  color: #2e7d32;
}

[data-theme="dark"] .status-delivered {
  background: rgba(46, 125, 50, 0.2);
  color: #4caf50;
}

.status-shipped {
  background: #fff3e0;
  color: #f97316;
}

[data-theme="dark"] .status-shipped {
  background: rgba(249, 115, 22, 0.2);
  color: #f97316;
}

.status-processing {
  background: #e3f2fd;
  color: #1976d2;
}

[data-theme="dark"] .status-processing {
  background: rgba(25, 118, 210, 0.2);
  color: #42a5f5;
}

.status-cancelled {
  background: #ffebee;
  color: #c62828;
}

[data-theme="dark"] .status-cancelled {
  background: rgba(198, 40, 40, 0.2);
  color: #ef5350;
}

/* Wishlist Items */
.wishlist-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.wishlist-item {
  display: flex;
  gap: 16px;
  background: var(--bg-primary);
  border-radius: 16px;
  padding: 16px;
  border: 1px solid var(--border-light);
  transition: all 0.2s;
  cursor: pointer;
}

.wishlist-item:hover {
  transform: translateX(5px);
  border-color: var(--orange-primary);
}

@media (max-width: 600px) {
  .wishlist-item {
    flex-direction: column;
  }
}

.wishlist-img {
  width: 100px;
  height: 100px;
  border-radius: 12px;
  object-fit: cover;
  flex-shrink: 0;
}

@media (max-width: 600px) {
  .wishlist-img {
    width: 100%;
    height: 160px;
  }
}

.wishlist-details {
  flex: 1;
}

.wishlist-name {
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 6px;
}

.wishlist-price {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin: 8px 0;
  flex-wrap: wrap;
}

.current-price {
  font-weight: 800;
  font-size: 18px;
  color: var(--green-primary);
}

.old-price {
  text-decoration: line-through;
  font-size: 13px;
  color: var(--text-muted);
}

.wishlist-actions {
  display: flex;
  gap: 12px;
  margin-top: 12px;
  flex-wrap: wrap;
}

/* Address Cards */
.addresses-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.address-card {
  background: var(--bg-primary);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border-light);
  transition: all 0.2s;
}

.address-card.address-default {
  border: 2px solid var(--green-primary);
  background: linear-gradient(135deg, var(--bg-primary), rgba(46, 125, 50, 0.05));
}

.address-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 16px;
}

.address-type {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
}

.default-badge {
  background: var(--green-primary);
  color: white;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
}

.address-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.address-actions button {
  background: transparent;
  border: 1px solid var(--border-light);
  padding: 6px 14px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}

.address-actions button:hover {
  background: var(--orange-primary);
  color: white;
  border-color: var(--orange-primary);
}

.address-details p {
  margin: 8px 0;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.address-details i {
  width: 20px;
  color: var(--orange-primary);
}

/* Settings Form */
.settings-form {
  max-width: 800px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

@media (max-width: 600px) {
  .form-row {
    grid-template-columns: 1fr;
    gap: 16px;
  }
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group label {
  font-weight: 600;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.form-group label .required {
  color: var(--red-primary);
}

.form-group input,
.form-group select {
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--border-light);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--orange-primary);
}

.form-group input[readonly] {
  background: var(--border-light);
  cursor: not-allowed;
}

/* Input with Edit Button */
.input-with-edit {
  display: flex;
  gap: 10px;
  align-items: center;
}

.input-with-edit input {
  flex: 1;
}

/* Buttons */
.btn-primary {
  background: var(--orange-primary);
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 30px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary:hover {
  opacity: 0.9;
  transform: translateY(-2px);
}

.btn-success {
  background: var(--green-primary);
  color: white;
  padding: 12px;
  border-radius: 40px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  border: none;
  font-size: 14px;
  transition: all 0.2s;
  margin-top: 16px;
}

.btn-success:hover {
  opacity: 0.9;
  transform: scale(0.98);
}

.btn-danger {
  background: var(--red-primary);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-danger:hover {
  opacity: 0.9;
  transform: scale(0.98);
}

.edit-btn {
  background: var(--orange-primary);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 30px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}

.edit-btn:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

/* Settings Cards */
.settings-card {
  background: var(--bg-primary);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 24px;
  border: 1px solid var(--border-light);
}

.settings-card h3 {
  font-size: 16px;
  margin: 0 0 16px 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-light);
}

.settings-card h3 i {
  color: var(--orange-primary);
}

/* Notification Settings */
.notification-option {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-light);
}

.notification-option:last-child {
  border-bottom: none;
}

.notification-option label {
  font-weight: 500;
  cursor: pointer;
}

.notification-option small {
  display: block;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Toggle Switch */
.toggle-switch {
  position: relative;
  width: 50px;
  height: 24px;
  display: inline-block;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  transition: 0.3s;
  border-radius: 34px;
}

.toggle-slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: 0.3s;
  border-radius: 50%;
}

input:checked + .toggle-slider {
  background-color: var(--green-primary);
}

input:checked + .toggle-slider:before {
  transform: translateX(26px);
}

/* Language Selector */
.language-selector {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--border-light);
  background: var(--surface);
  color: var(--text-primary);
  font-size: 14px;
}

/* Preference Tags */
.preference-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 8px;
}

.preference-tag {
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 30px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}

.preference-tag:hover {
  border-color: var(--orange-primary);
}

.preference-tag.selected {
  background: var(--orange-primary);
  color: white;
  border-color: var(--orange-primary);
}

/* Payment Methods */
.payment-method {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 15px 0;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
}

.payment-method:last-child {
  border-bottom: none;
}

.payment-method i {
  width: 40px;
  font-size: 24px;
  color: var(--orange-primary);
}

.payment-method .payment-info {
  flex: 1;
}

.payment-method .payment-name {
  font-weight: 600;
}

.payment-method .payment-details {
  font-size: 12px;
  color: var(--text-muted);
}

.payment-method .radio {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-light);
  border-radius: 50%;
  display: inline-block;
  position: relative;
}

.payment-method.selected .radio {
  border-color: var(--green-primary);
}

.payment-method.selected .radio:after {
  content: '';
  width: 10px;
  height: 10px;
  background: var(--green-primary);
  border-radius: 50%;
  position: absolute;
  top: 3px;
  left: 3px;
}

/* Add Payment Button */
.add-payment-btn {
  width: 100%;
  background: transparent;
  border: 1px dashed var(--orange-primary);
  padding: 12px;
  border-radius: 12px;
  margin-top: 12px;
  color: var(--orange-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* Danger Zone */
.danger-zone {
  border-color: var(--red-primary);
  background: rgba(239, 68, 68, 0.05);
}

.danger-zone h3 {
  color: var(--red-primary);
  border-bottom-color: var(--red-primary);
}

.danger-zone h3 i {
  color: var(--red-primary);
}

.danger-btn {
  background: transparent;
  border: 1px solid var(--red-primary);
  color: var(--red-primary);
  padding: 10px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}

.danger-btn:hover {
  background: var(--red-primary);
  color: white;
}

/* Photo Section */
.photo-section {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border-light);
  flex-wrap: wrap;
}

.profile-photo {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--orange-primary), var(--green-primary));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  overflow: hidden;
  position: relative;
}

.profile-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.profile-photo i {
  font-size: 36px;
  color: white;
}

.photo-hint {
  font-size: 12px;
  color: var(--text-muted);
}

/* Modal Styles */
.address-form-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 2000;
  justify-content: center;
  align-items: center;
}

.address-form-container {
  background: var(--surface);
  border-radius: 24px;
  width: 90%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 24px;
}

.address-form-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.address-form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 600px) {
  .address-form-row {
    grid-template-columns: 1fr;
  }
}

.address-form-group {
  margin-bottom: 16px;
}

.address-form-group label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
  font-size: 13px;
}

.address-form-group input,
.address-form-group select,
.address-form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid var(--border-light);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
}

.form-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  justify-content: flex-end;
}

.btn-submit {
  background: var(--green-primary);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 600;
}

.btn-cancel {
  background: var(--red-primary);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 600;
}

/* Empty States */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state i {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-state p {
  margin-bottom: 20px;
}

.empty-state button {
  background: var(--orange-primary);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 600;
}

/* Load More Button */
.load-more-btn {
  background: transparent;
  border: 1px solid var(--border-light);
  color: var(--text-secondary);
  padding: 12px 24px;
  border-radius: 40px;
  cursor: pointer;
  font-weight: 600;
  width: 100%;
  margin-top: 20px;
  transition: all 0.2s;
}

.load-more-btn:hover {
  background: var(--bg-primary);
  border-color: var(--orange-primary);
  color: var(--orange-primary);
}

/* Toast Notification */
.account-toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--green-primary);
  color: white;
  padding: 10px 20px;
  border-radius: 40px;
  z-index: 2000;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

/* Blink Animation for Highlight */
@keyframes blinkHighlight {
  0%, 100% {
    background-color: transparent;
    border-color: var(--border-light);
  }
  25%, 75% {
    background-color: rgba(249, 115, 22, 0.3);
    border-color: var(--orange-primary);
  }
  50% {
    background-color: rgba(249, 115, 22, 0.15);
    border-color: var(--orange-primary);
  }
}

.order-highlight {
  animation: blinkHighlight 1.5s ease-in-out 3;
  box-shadow: 0 0 0 2px var(--orange-primary);
}

/* Custom Scrollbars */
.orders-list::-webkit-scrollbar,
.wishlist-grid::-webkit-scrollbar,
.addresses-grid::-webkit-scrollbar {
  width: 6px;
}

.orders-list::-webkit-scrollbar-track,
.wishlist-grid::-webkit-scrollbar-track,
.addresses-grid::-webkit-scrollbar-track {
  background: var(--border-light);
  border-radius: 10px;
}

        const savedAddresses = localStorage.getItem('freshkart_addresses');

          { id: 1, name: "Rahul Sharma", phone: "9876543210", altPhone: "8765432109", building: "123, Green Park", landmark: "Near City Mall", address: "Green Park Main Road", pincode: "110001", type: "Home", isDefault: true },

        ];
        
        const savedPayments = localStorage.getItem('freshkart_payments');
        paymentMethods = savedPayments ? JSON.parse(savedPayments) : [
          { id: 1, type: "card", name: "Visa ****4242", isDefault: true },
          { id: 2, type: "upi", name: "rahul@okhdfcbank", isDefault: false }
        ];
        
        const savedUser = localStorage.getItem('freshkart_user_data');
        userData = savedUser ? JSON.parse(savedUser) : { 
          name: "Rahul Sharma", email: "rahul@example.com", phone: "9876543210", altPhone: "8765432109",
          gender: "male", age: "28", photo: null, googleConnected: true, googleEmail: "rahul.sharma@gmail.com"
        };
        
        const savedNotif = localStorage.getItem('freshkart_notifications');
        if (savedNotif) notificationPreferences = JSON.parse(savedNotif);
        
        const savedPrefs = localStorage.getItem('freshkart_preferences');
        if (savedPrefs) userPreferences = JSON.parse(savedPrefs);
        
      } catch(e) { console.error('Error loading data:', e); }
    }

    function generateSampleOrders() {
      const orders = [];
      const statuses = ['delivered', 'delivered', 'delivered', 'shipped', 'processing'];
      for (let i = 1; i <= 12; i++) {
        const status = statuses[Math.floor(Math.random() * statuses.length)];
        const date = new Date();
        date.setDate(date.getDate() - i);
        orders.push({
          id: `FRK-${String(10000 + i).slice(1)}`,
          date: date.toISOString().split('T')[0],
          status: status,
          subtotal: Math.floor(Math.random() * 1500) + 300,
          deliveryFee: Math.random() > 0.7 ? 40 : 0,
          platformFee: 9,
          discount: Math.floor(Math.random() * 200) + 20,
          total: 0,
          items: [{ productId: 1, name: "Organic Apples", quantity: Math.floor(Math.random() * 3) + 1, image: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=200" }]
        });
        orders[orders.length - 1].total = orders[orders.length - 1].subtotal + orders[orders.length - 1].deliveryFee + orders[orders.length - 1].platformFee - orders[orders.length - 1].discount;
      }
      return orders;
    }

            <div class="wishlist-actions"><button class="btn-primary" onclick="event.stopPropagation();addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')})"><i class="fas fa-cart-plus"></i> Add to Cart</button><button class="btn-danger" onclick="event.stopPropagation();removeFromWishlist(${p.id})"><i class="fas fa-trash"></i> Remove</button></div></div>

      document.getElementById('accountMain').innerHTML = `

      document.getElementById('accountMain').innerHTML = `
        <div class="section-header"><h2><i class="fas fa-shield-alt"></i> Security</h2></div>
        <div class="settings-card"><h3><i class="fas fa-lock"></i> Login & Security</h3><div style="margin-bottom:15px;"><div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;"><span><strong>Password</strong><br><small>●●●●●●●●</small></span><button class="edit-btn" onclick="showToast('Change password feature coming soon')">Change</button></div><div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;"><span><strong>Email</strong><br><small>${userData.email}</small></span><button class="edit-btn" onclick="showToast('Update email feature coming soon')">Update</button></div><div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;"><span><strong>Phone</strong><br><small>${userData.phone}</small></span><button class="edit-btn" onclick="showToast('Update phone feature coming soon')">Update</button></div></div></div>
        <div class="settings-card"><h3><i class="fas fa-mobile-alt"></i> Two-Factor Authentication</h3><div class="notification-option"><div><label>Enable 2FA</label><small>Add an extra layer of security to your account</small></div><label class="toggle-switch"><input type="checkbox" id="twoFactorToggle"><span class="toggle-slider"></span></label></div></div>
        <div class="settings-card"><h3><i class="fab fa-google"></i> Connected Accounts</h3><div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;"><span><i class="fab fa-google" style="color:#4285f4;"></i> Google Account<br><small>${userData.googleConnected ? userData.googleEmail : 'Not connected'}</small></span><button class="edit-btn" onclick="toggleGoogleAuth()">${userData.googleConnected ? 'Disconnect' : 'Connect'}</button></div></div>
        <div class="settings-card danger-zone"><h3><i class="fas fa-exclamation-triangle"></i> Danger Zone</h3><div style="display:flex;gap:15px;flex-wrap:wrap;"><button class="danger-btn" onclick="deactivateAccount()"><i class="fas fa-user-slash"></i> Deactivate Account</button><button class="danger-btn" onclick="deleteAccount()"><i class="fas fa-trash-alt"></i> Delete Account Permanently</button></div></div>
      `;
    }

    // ==================== SETTINGS ====================
    function renderSettings() {
      document.getElementById('accountMain').innerHTML = `
        <div class="section-header"><h2><i class="fas fa-user-cog"></i> Account Settings</h2></div>
        <div class="photo-section"><div class="profile-photo" id="profilePhotoPreview" onclick="triggerPhotoUpload()"><i class="fas fa-user"></i></div><div class="photo-hint"><small>Click to change profile photo</small><input type="file" id="photoUpload" accept="image/*" style="display:none" onchange="updateProfilePhoto(this)"></div></div>
        <form id="profileForm" class="settings-form"><div class="form-row"><div class="form-group"><label>Full Name <span class="required">*</span></label><input type="text" id="fullName" value="${userData.name}" readonly></div><div class="form-group"><label>Email <span class="required">*</span></label><input type="email" id="emailId" value="${userData.email}" readonly></div></div>
        <div class="form-row"><div class="form-group"><label>Mobile Number</label><div class="input-with-edit"><input type="tel" id="mobileNo" value="${userData.phone}" readonly><button type="button" class="edit-btn" id="editMobileBtn"><i class="fas fa-edit"></i> Edit</button><button type="button" class="edit-btn" id="saveMobileBtn" style="display:none;background:var(--green-primary);">Save</button><button type="button" class="edit-btn" id="cancelMobileBtn" style="display:none;background:var(--red-primary);">Cancel</button></div></div>
        <div class="form-group"><label>Alternative Mobile</label><div class="input-with-edit"><input type="tel" id="altMobileNo" value="${userData.altPhone || ''}" readonly><button type="button" class="edit-btn" id="editAltMobileBtn"><i class="fas fa-edit"></i> Edit</button><button type="button"class="edit-btn" id="saveAltMobileBtn" style="display:none;background:var(--green-primary);">Save</button><button type="button" class="edit-btn" id="cancelAltMobileBtn" style="display:none;background:var(--red-primary);">Cancel</button></div></div></div>
        <div class="form-row"><div class="form-group"><label>Gender</label><select id="gender"><option value="male" ${userData.gender === 'male' ? 'selected' : ''}>Male</option><option value="female" ${userData.gender === 'female' ? 'selected' : ''}>Female</option><option value="other" ${userData.gender === 'other' ? 'selected' : ''}>Other</option></select></div>
        <div class="form-group"><label>Date of Birth</label><input type="date" id="dob" value="${userData.dob || ''}"></div></div>
        <button type="submit" class="btn-success"><i class="fas fa-save"></i> Save Profile Changes</button></form>
        <div style="margin-top:30px;"><button onclick="logout()" class="btn-danger" style="width:100%;"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
      `;
      if (userData.photo) document.getElementById('profilePhotoPreview').innerHTML = `<img src="${userData.photo}">`;
      
      setupEditableField('mobileNo', 'editMobileBtn', 'saveMobileBtn', 'cancelMobileBtn', (v) => { if(/^[0-9]{10}$/.test(v)){userData.phone=v;saveUserData();showToast('Mobile updated');return true;}showToast('Invalid number');return false;});
      setupEditableField('altMobileNo', 'editAltMobileBtn', 'saveAltMobileBtn', 'cancelAltMobileBtn', (v) => {userData.altPhone=v;saveUserData();showToast('Updated');return true;});
      document.getElementById('profileForm').onsubmit = (e) => { e.preventDefault(); userData.gender = document.getElementById('gender').value; userData.dob = document.getElementById('dob').value; saveUserData(); showToast('Profile updated!'); };
    }

    function setupEditableField(inputId, editId, saveId, cancelId, onSave) {
      const input = document.getElementById(inputId), edit = document.getElementById(editId), save = document.getElementById(saveId), cancel = document.getElementById(cancelId);
      if(!input||!edit) return;
      let original = input.value;
      edit.onclick = () => { original = input.value; input.readOnly = false; input.style.background = 'var(--bg-primary)'; input.style.border = '1px solid var(--orange-primary)'; edit.style.display = 'none'; if(save) save.style.display = 'inline-flex'; if(cancel) cancel.style.display = 'inline-flex'; input.focus(); };
      if(save) save.onclick = () => { if(onSave(input.value.trim())) { input.readOnly = true; input.style.background = 'var(--border-light)'; input.style.border = ''; edit.style.display = 'inline-flex'; save.style.display = 'none'; if(cancel) cancel.style.display = 'none'; } else { input.value = original; } };
      if(cancel) cancel.onclick = () => { input.value = original; input.readOnly = true; input.style.background = 'var(--border-light)'; input.style.border = ''; edit.style.display = 'inline-flex'; save.style.display = 'none'; cancel.style.display = 'none'; };
    }

    // ==================== HELPER FUNCTIONS ====================
    function goToOrderDetails(orderId) { sessionStorage.setItem('highlightOrderId', orderId); window.location.href = 'orders.html'; }
    function removeFromWishlist(id) { const idx = wishlist.indexOf(id); if(idx !== -1) wishlist.splice(idx,1); saveWishlist(); renderWishlist(); showToast('Removed from wishlist'); }
    function setDefaultAddress(id) { addresses = addresses.map(a => ({...a, isDefault: a.id === id})); saveAddresses(); renderAddresses(); showToast('Default address updated'); }
    function deleteAddress(id) { if(confirm('Delete this address?')) { addresses = addresses.filter(a => a.id !== id); if(addresses.length && !addresses.some(a=>a.isDefault)) addresses[0].isDefault = true; saveAddresses(); renderAddresses(); showToast('Address deleted'); } }
    function openAddAddressModal() { currentEditingAddressId = null; document.getElementById('addressModalTitle').innerText = 'Add New Address'; document.getElementById('addressForm').reset(); document.getElementById('addressId').value = ''; document.getElementById('addressModal').style.display = 'flex'; }
    function editAddress(id) { const a = addresses.find(a=>a.id===id); if(a){ currentEditingAddressId=id; document.getElementById('addressModalTitle').innerText='Edit Address'; document.getElementById('addressId').value=a.id; document.getElementById('addrFullName').value=a.name; document.getElementById('addrPhone').value=a.phone; document.getElementById('addrAltPhone').value=a.altPhone||''; document.getElementById('addrPincode').value=a.pincode; document.getElementById('addrBuilding').value=a.building; document.getElementById('addrLandmark').value=a.landmark||''; document.getElementById('addrAddress').value=a.address; document.getElementById('addrType').value=a.type; document.getElementById('addressModal').style.display='flex'; } }
    function closeAddressModal() { document.getElementById('addressModal').style.display = 'none'; }
    function openPaymentModal() { document.getElementById('paymentModal').style.display = 'flex'; }
    function closePaymentModal() { document.getElementById('paymentModal').style.display = 'none'; }
    function selectDefaultPayment(id) { paymentMethods = paymentMethods.map(p => ({...p, isDefault: p.id === id})); savePaymentMethods(); renderPayments(); showToast('Default payment method updated'); }
    function saveNotificationSettings() { saveNotificationPrefs(); showToast('Notification settings saved'); }
    function savePreferences() { userPreferences.language = document.getElementById('prefLanguage')?.value || 'english'; userPreferences.currency = document.getElementById('prefCurrency')?.value || 'INR'; userPreferences.diet = [...document.querySelectorAll('#dietTags .preference-tag.selected')].map(t => t.dataset.diet); saveUserPreferences(); showToast('Preferences saved'); }
    function toggleGoogleAuth() { if(userData.googleConnected){ if(confirm('Disconnect Google?')){ userData.googleConnected=false; userData.googleEmail=null; saveUserData(); showToast('Google disconnected'); } } else { alert('Demo: Connecting Google account...'); userData.googleConnected=true; userData.googleEmail=userData.email; saveUserData(); showToast('Google connected'); } renderSecurity(); }
    function deactivateAccount() { if(confirm('Deactivate your account?\nYou can reactivate by logging in within 30 days.')){ showToast('Account deactivated'); setTimeout(()=>logout(),1500); } }
    function deleteAccount() { if(confirm('⚠️ PERMANENT ACTION: Delete your account?\nAll data will be lost forever!')){ if(confirm('Type DELETE to confirm')){ localStorage.clear(); window.location.href='index.html'; } } }
    function triggerPhotoUpload() { document.getElementById('photoUpload')?.click(); }
    function updateProfilePhoto(input) { if(input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => { userData.photo = e.target.result; saveUserData(); const avatar = document.querySelector('.profile-avatar'); if(avatar) avatar.innerHTML = `<img src="${userData.photo}">`; const preview = document.getElementById('profilePhotoPreview'); if(preview) preview.innerHTML = `<img src="${userData.photo}">`; showToast('Photo updated'); }; reader.readAsDataURL(input.files[0]); } }
    function viewProduct(id) { window.location.href = `description.html?id=${id}`; }
    function logout() { if(confirm('Logout?')) { localStorage.removeItem('freshkart_user_data'); window.location.href = 'index.html'; } }
    function showToast(msg) { let t = document.querySelector('.account-toast'); if(!t){ t=document.createElement('div'); t.className='account-toast'; document.body.appendChild(t); } t.innerHTML=`<i class="fas fa-check-circle"></i> ${msg}`; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2000); }
    function switchTab(tab) { document.querySelectorAll('.sidebar-menu a').forEach(a=>a.classList.remove('active')); document.querySelector(`.sidebar-menu a[data-tab="${tab}"]`)?.classList.add('active'); if(tab==='dashboard') renderDashboard(); else if(tab==='orders'){currentDisplayLimit=10;renderOrders();} else if(tab==='wishlist') renderWishlist(); else if(tab==='addresses') renderAddresses(); else if(tab==='payments') renderPayments(); else if(tab==='notifications') renderNotifications(); else if(tab==='preferences') renderPreferences(); else if(tab==='security') renderSecurity(); else if(tab==='settings') renderSettings(); }

    // Address form handler
    document.getElementById('addressForm').onsubmit = (e) => {
      e.preventDefault();
      const phone = document.getElementById('addrPhone').value;
      if(!/^[0-9]{10}$/.test(phone)) return alert('Valid 10-digit phone required');
      const pincode = document.getElementById('addrPincode').value;
      if(!/^[0-9]{6}$/.test(pincode)) return alert('Valid 6-digit pincode required');
      const addrData = { id: currentEditingAddressId || Date.now(), name: document.getElementById('addrFullName').value, phone: phone, altPhone: document.getElementById('addrAltPhone').value, pincode: pincode, building: document.getElementById('addrBuilding').value, landmark: document.getElementById('addrLandmark').value, address: document.getElementById('addrAddress').value, type: document.getElementById('addrType').value, isDefault: currentEditingAddressId ? (addresses.find(a=>a.id===currentEditingAddressId)?.isDefault||false) : addresses.length===0 };
      if(currentEditingAddressId){ const idx=addresses.findIndex(a=>a.id===currentEditingAddressId); if(idx!==-1) addresses[idx]=addrData; } else addresses.push(addrData);
      saveAddresses(); closeAddressModal(); renderAddresses(); showToast('Address saved');
    };

    // document.getElementById('paymentForm').onsubmit = (e) => {
    //   e.preventDefault();
    //   const type = document.getElementById('paymentType').value;
    //   let name = '';
    //   if(type === 'card') name = `💳 ****${document.getElementById('cardNumber').value.slice(-4)}`;
    //   else if(type === 'upi') name = `📱 ${document.getElementById('upiId').value}`;
    //   else name = type === 'netbanking' ? '🏦 Net Banking' : '👛 Wallet';
    //   paymentMethods.push({ id: Date.now(), type: type, name: name, isDefault: paymentMethods.length === 0 });
    //   savePaymentMethods(); closePaymentModal(); renderPayments(); showToast('Payment method added');
    // };

    // document.getElementById('paymentType')?.addEventListener('change', (e) => {
    //   document.getElementById('cardFields').style.display = e.target.value === 'card' ? 'block' : 'none';
    //   document.getElementById('upiFields').style.display = e.target.value === 'upi' ? 'block' : 'none';
    // });

    // Initialize
    async function initPage() { await initCommon(()=>{}); loadUserData(); if(userData.photo) document.querySelector('.profile-avatar').innerHTML = `<img src="${userData.photo}">`; renderDashboard(); document.querySelectorAll('.sidebar-menu a').forEach(a=>a.addEventListener('click',(e)=>{e.preventDefault();switchTab(a.dataset.tab);})); }
    window.switchTab = switchTab; window.goToOrderDetails = goToOrderDetails; window.loadMoreOrders = loadMoreOrders; window.removeFromWishlist = removeFromWishlist; window.setDefaultAddress = setDefaultAddress; window.deleteAddress = deleteAddress; window.openAddAddressModal = openAddAddressModal; window.editAddress = editAddress; window.closeAddressModal = closeAddressModal; window.openPaymentModal = openPaymentModal; window.closePaymentModal = closePaymentModal; window.selectDefaultPayment = selectDefaultPayment; window.saveNotificationSettings = saveNotificationSettings; window.savePreferences = savePreferences; window.toggleGoogleAuth = toggleGoogleAuth; window.deactivateAccount = deactivateAccount; window.deleteAccount = deleteAccount; window.triggerPhotoUpload = triggerPhotoUpload; window.updateProfilePhoto = updateProfilePhoto; window.viewProduct = viewProduct; window.logout = logout; window.showToast = showToast;
    initPage();
  </script>
